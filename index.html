<!DOCTYPE html>
<html>
<head>
  <title>Project Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 0;
      padding: 20px;
      background-color: #f5f5f5;
    }
    h1 {
      margin-bottom: 10px;
    }
    p {
      color: #555;
    }
    .video-container {
      position: relative;
      padding-bottom: 56.25%; /* 16:9 ratio */
      height: 0;
      overflow: hidden;
      max-width: 800px;
      margin: auto;
    }
    .video-container iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>

<body>
  <h1>Project Demo</h1>

  <div class="video-container">
    <iframe 
    width="100%" 
    height="400"
    src="https://www.youtube.com/embed/SPOXV0Hsb00"
    allowfullscreen>
    </iframe>
  </div>

</body>
</html>
